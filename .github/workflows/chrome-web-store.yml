name: Deploy to Chrome Web Store

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Verify version synchronization
        id: version_check
        run: |
          # Extract version from tag (e.g., refs/tags/v1.3.0 -> 1.3.0)
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          
          echo "Tag version: $VERSION"
          echo "package.json version: $PACKAGE_VERSION"
          echo "manifest.json version: $MANIFEST_VERSION"
          
          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Tag version ($VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi
          
          if [ "$VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag version ($VERSION) does not match manifest.json version ($MANIFEST_VERSION)"
            exit 1
          fi
          
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build extension
        run: npm run build

      - name: Package extension
        run: |
          mkdir -p dist-zip
          cd dist
          zip -r ../dist-zip/yt-music-plus-v${{ steps.version_check.outputs.VERSION }}.zip .
          cd ..

      - name: Upload to GitHub Release
        run: gh release upload ${{ github.event.release.tag_name }} dist-zip/yt-music-plus-v${{ steps.version_check.outputs.VERSION }}.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload and Publish to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: dist-zip/yt-music-plus-v${{ steps.version_check.outputs.VERSION }}.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: true
